# XcodeGen spec — the source of truth for the Xcode project.
# Run `xcodegen` to (re)generate Echo.xcodeproj identically on any machine.
name: Echo
options:
  bundleIdPrefix: com.rannyeri
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  Echo:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        optional: true          # optional test assets, not required to build
    info:
      path: Sources/Info.plist   # generated by XcodeGen from the properties below
      properties:
        CFBundleDisplayName: Echo
        UILaunchScreen: {}
        # Keep Echo alive to play while backgrounded / screen locked during a run.
        UIBackgroundModes: [audio]
        # Talking to the Mac's Tailscale IP counts as "local network" on iOS.
        NSLocalNetworkUsageDescription: "Echo connects to your Mac over your private Tailscale network to receive voice clips."
        # The Mac endpoint is plain HTTP over Tailscale (already private), so
        # allow it past App Transport Security. Personal sideloaded app.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rannyeri.echo
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"        # iPhone
        SWIFT_VERSION: "5.9"
